<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate Ticket - Staff Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8fafc;
            min-height: 100vh;
        }

        .header {
            background: white;
            border-bottom: 1px solid #e2e8f0;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 24px;
            color: #1e293b;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
        }

        .logout-btn {
            padding: 8px 16px;
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }

        .logout-btn:hover {
            background: #fee2e2;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 40px;
        }

        .page-header {
            margin-bottom: 32px;
        }

        .page-header h2 {
            font-size: 32px;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .page-header p {
            color: #64748b;
            font-size: 16px;
        }

        .alert {
            padding: 14px 18px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: 14px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .alert-error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }

        .form-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
            max-width: 600px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #475569;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            background: #f8fafc;
            color: #1e293b;
            cursor: pointer;
        }

        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .btn-primary {
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .ticket-preview {
            background: white;
            padding: 0;
            border-radius: 0;
            border: 2px solid #1e293b;
            margin-top: 32px;
            display: none;
            max-width: 400px;
            font-family: 'Courier New', monospace;
        }

        .ticket-preview.show {
            display: block;
        }

        .ticket-header {
            text-align: center;
            padding: 20px;
            border-bottom: 2px dashed #1e293b;
        }

        .ticket-header h3 {
            font-size: 18px;
            color: #1e293b;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .ticket-body {
            padding: 20px;
        }

        .ticket-id {
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            color: #1e293b;
            padding: 16px;
            background: #f8fafc;
            border: 2px solid #1e293b;
            margin-bottom: 16px;
            letter-spacing: 2px;
        }

        .ticket-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .ticket-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dotted #cbd5e1;
            font-size: 14px;
        }

        .ticket-row:last-child {
            border-bottom: none;
        }

        .ticket-label {
            color: #64748b;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 11px;
        }

        .ticket-value {
            color: #1e293b;
            font-weight: 700;
            text-align: right;
        }

        .ticket-footer {
            text-align: center;
            padding: 20px;
            border-top: 2px dashed #1e293b;
            font-size: 12px;
            color: #64748b;
        }

        .print-btn {
            width: 100%;
            padding: 12px;
            background: #1e293b;
            color: white;
            border: none;
            border-radius: 0;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 16px;
        }

        .print-btn:hover {
            background: #334155;
        }

        @media (max-width: 768px) {
            .header {
                padding: 16px 20px;
            }

            .container {
                padding: 0 20px;
            }

            .form-card {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Staff Dashboard</h1>
        <div class="user-info">
            <div class="user-avatar" id="userAvatar"></div>
            <span id="userName"></span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="container">
        <div class="page-header">
            <h2>Generate Ticket</h2>
            <p>Select event and entry type to generate a new ticket</p>
        </div>

        <div id="alert" class="alert"></div>

        <div class="form-card">
            <div>
                <div class="form-group">
                    <label>Event *</label>
                    <select id="eventSelect" required>
                        <option value="">Loading events...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Sub Event *</label>
                    <select id="subEventSelect" required disabled>
                        <option value="">Select event first</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Entry Type *</label>
                    <select id="entryTypeSelect" required disabled>
                        <option value="">Select sub event first</option>
                    </select>
                </div>

                <button type="button" class="btn-primary" id="generateBtn" onclick="generateTicket()">
                    Generate Ticket
                </button>
            </div>
        </div>

        <div id="ticketPreview" class="ticket-preview"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000/api';
        let accessToken = localStorage.getItem('access_token');
        let userData = JSON.parse(localStorage.getItem('user_data') || '{}');

        // Check authentication
        if (!accessToken) {
            window.location.href = 'staff_login.html';
        }

        // Display user info
        document.getElementById('userName').textContent = userData.username || 'Staff';
        document.getElementById('userAvatar').textContent = (userData.username || 'S').charAt(0).toUpperCase();

        function showAlert(message, type) {
            const alertBox = document.getElementById('alert');
            alertBox.textContent = message;
            alertBox.className = `alert alert-${type} show`;
            setTimeout(() => {
                alertBox.className = 'alert';
            }, 5000);
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'staff_login.html';
        }

        // Load sub-events
        async function loadSubEvents() {
            try {
                const response = await fetch(`${API_BASE}/staff/sub-events/0/`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const subEvents = await response.json();
                
                const eventSelect = document.getElementById('eventSelect');
                const subEventSelect = document.getElementById('subEventSelect');
                
                // Get unique events
                const events = {};
                subEvents.forEach(se => {
                    if (!events[se.event]) {
                        events[se.event] = se.event_name;
                    }
                });

                eventSelect.innerHTML = '<option value="">Select an event</option>';
                Object.keys(events).forEach(eventId => {
                    eventSelect.innerHTML += `<option value="${eventId}">${events[eventId]}</option>`;
                });

                // Store all sub-events for filtering
                window.allSubEvents = subEvents;
            } catch (error) {
                showAlert('Failed to load events', 'error');
            }
        }

        // Event change handler
        document.getElementById('eventSelect').addEventListener('change', function() {
            const eventId = this.value;
            const subEventSelect = document.getElementById('subEventSelect');
            const entryTypeSelect = document.getElementById('entryTypeSelect');

            if (!eventId) {
                subEventSelect.disabled = true;
                subEventSelect.innerHTML = '<option value="">Select event first</option>';
                entryTypeSelect.disabled = true;
                entryTypeSelect.innerHTML = '<option value="">Select sub event first</option>';
                return;
            }

            const filteredSubEvents = window.allSubEvents.filter(se => se.event == eventId);
            subEventSelect.innerHTML = '<option value="">Select a sub event</option>';
            filteredSubEvents.forEach(se => {
                subEventSelect.innerHTML += `<option value="${se.id}">${se.name}</option>`;
            });
            subEventSelect.disabled = false;
            entryTypeSelect.disabled = true;
            entryTypeSelect.innerHTML = '<option value="">Select sub event first</option>';
        });

        // Sub-event change handler
        document.getElementById('subEventSelect').addEventListener('change', async function() {
            const subEventId = this.value;
            const entryTypeSelect = document.getElementById('entryTypeSelect');

            if (!subEventId) {
                entryTypeSelect.disabled = true;
                entryTypeSelect.innerHTML = '<option value="">Select sub event first</option>';
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/staff/entry-types/${subEventId}/`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const entryTypes = await response.json();

                entryTypeSelect.innerHTML = '<option value="">Select an entry type</option>';
                entryTypes.forEach(et => {
                    entryTypeSelect.innerHTML += `<option value="${et.id}">${et.name} - ₹${et.price}</option>`;
                });
                entryTypeSelect.disabled = false;
            } catch (error) {
                showAlert('Failed to load entry types', 'error');
            }
        });

        // Form submit
        async function generateTicket() {
            const eventId = document.getElementById('eventSelect').value;
            const subEventId = document.getElementById('subEventSelect').value;
            const entryTypeId = document.getElementById('entryTypeSelect').value;
            const generateBtn = document.getElementById('generateBtn');

            if (!eventId || !subEventId || !entryTypeId) {
                showAlert('Please select all fields', 'error');
                return;
            }

            console.log('Generating ticket:', { eventId, subEventId, entryTypeId });

            generateBtn.disabled = true;
            generateBtn.textContent = 'Generating...';

            try {
                const response = await fetch(`${API_BASE}/staff/generate-ticket/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${accessToken}`
                    },
                    body: JSON.stringify({
                        event_id: parseInt(eventId),
                        sub_event_id: parseInt(subEventId),
                        entry_type_id: parseInt(entryTypeId)
                    })
                });

                const data = await response.json();

                console.log('Response:', response.ok, data);

                if (response.ok) {
                    showAlert('Ticket generated successfully!', 'success');
                    // Store ticket data and redirect
                    localStorage.setItem('generated_ticket', JSON.stringify(data.ticket));
                    window.location.href = 'ticket_view.html';
                } else {
                    showAlert(data.error || JSON.stringify(data) || 'Failed to generate ticket', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('Connection error. Please try again.', 'error');
            } finally {
                generateBtn.disabled = false;
                generateBtn.textContent = 'Generate Ticket';
            }
        }

        function displayTicket(ticket) {
            const preview = document.getElementById('ticketPreview');
            const date = new Date(ticket.created_at).toLocaleString();
            
            preview.innerHTML = `
                <div class="ticket-header">
                    <h3>FESTIVAL TICKET</h3>
                    <div style="font-size: 12px; color: #64748b;">${date}</div>
                </div>
                <div class="ticket-body">
                    <div class="ticket-id">${ticket.ticket_id}</div>
                    <div class="ticket-info">
                        <div class="ticket-row">
                            <span class="ticket-label">Event</span>
                            <span class="ticket-value">${ticket.event_name}</span>
                        </div>
                        <div class="ticket-row">
                            <span class="ticket-label">Sub Event</span>
                            <span class="ticket-value">${ticket.sub_event_name}</span>
                        </div>
                        <div class="ticket-row">
                            <span class="ticket-label">Venue</span>
                            <span class="ticket-value">${ticket.place}</span>
                        </div>
                        <div class="ticket-row">
                            <span class="ticket-label">Type</span>
                            <span class="ticket-value">${ticket.entry_type}</span>
                        </div>
                        <div class="ticket-row">
                            <span class="ticket-label">Price</span>
                            <span class="ticket-value">₹${ticket.price}</span>
                        </div>
                        <div class="ticket-row">
                            <span class="ticket-label">S.No</span>
                            <span class="ticket-value">#${ticket.sequence_number}</span>
                        </div>
                    </div>
                </div>
                <div class="ticket-footer">
                    <div>THANK YOU FOR YOUR VISIT</div>
                    <div style="margin-top: 8px;">KEEP THIS TICKET SAFE</div>
                </div>
                <button class="print-btn" onclick="window.print()">PRINT TICKET</button>
            `;
            preview.className = 'ticket-preview show';
            preview.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        // Load initial data
        loadSubEvents();
    </script>
</body>
</html>
